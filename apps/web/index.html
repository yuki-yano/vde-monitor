<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#eff1f5" />
    <title>VDE Monitor</title>
    <link rel="icon" type="image/svg+xml" href="/icons/icon-source.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <script>
      (() => {
        const storageKey = "vde-monitor-theme";
        let preference = "system";
        try {
          const stored = window.localStorage.getItem(storageKey);
          if (stored === "system" || stored === "latte" || stored === "mocha") {
            preference = stored;
          }
        } catch {
          preference = "system";
        }
        const resolved =
          preference === "system"
            ? window.matchMedia?.("(prefers-color-scheme: dark)")?.matches
              ? "mocha"
              : "latte"
            : preference;
        document.documentElement.dataset.theme = resolved;
        const themeColors = { latte: "#eff1f5", mocha: "#1e1e2e" };
        const syncThemeColor = () => {
          const meta = document.querySelector('meta[name="theme-color"]');
          const theme = document.documentElement.dataset.theme;
          meta?.setAttribute("content", themeColors[theme] ?? themeColors.latte);
        };
        syncThemeColor();
        new MutationObserver(syncThemeColor).observe(document.documentElement, {
          attributes: true,
          attributeFilter: ["data-theme"],
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
