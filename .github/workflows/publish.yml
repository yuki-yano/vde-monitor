name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise Node
        uses: ./.github/actions/setup-mise-node

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "STORE_PATH=$(mise exec -- pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Run CI
        run: mise exec -- pnpm run ci

      - name: Build package
        run: mise exec -- pnpm build

      - name: Ensure npm version
        run: mise exec -- npm install -g npm@11.5.1

      - name: Publish
        # npm publish alone leaves catalog: specifiers unresolved; pnpm pack rewrites them
        run: |
          mise exec -- pnpm pack
          mise exec -- npm publish ./vde-monitor-*.tgz
